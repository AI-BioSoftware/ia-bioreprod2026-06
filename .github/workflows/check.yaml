name: R-CMD-check

on:
  push:
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::BiocManager
          needs: check
      - name: Install Bioconductor dependency
        run: Rscript -e 'BiocManager::install("ComplexHeatmap", ask = FALSE, update = FALSE)'
      - name: Check
        run: R CMD build . && R CMD check --no-manual *.tar.gz
